version: "3.9"

# ── Local development compose ─────────────────────────────────────────────────
# Starts: postgres + orderpulse API
# Migrations run automatically on API startup.
# Use `make docker-up` to start.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: orderpulse
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: orderpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderpulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use Docker service name instead of localhost
      DATABASE_URL: postgres://orderpulse:secret@postgres:5432/orderpulse?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
